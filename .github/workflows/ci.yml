name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    env:
      OLLAMA_DISCORD_SKIP_DOTENV: "1"
      MAX_MEMORY_MESSAGES: "0"
      MEMORY_FILE: ${{ github.workspace }}/.pytest_tmp/ci-memory.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile and import
        shell: bash
        run: |
          python -m compileall -q bot.py tests
          python -c "import bot; print('import ok')"

      - name: Ruff lint
        shell: bash
        run: ruff check .

      - name: Pytest with coverage
        shell: bash
        run: pytest --cov --cov-report=term-missing

      - name: Dependency vulnerability audit
        if: matrix.python-version == '3.11'
        shell: bash
        run: pip-audit --cache-dir .pip-audit-cache --skip-editable

      - name: Set up Go for actionlint
        if: matrix.python-version == '3.11'
        uses: actions/setup-go@v6.5.0
        with:
          go-version: stable

      - name: Install actionlint
        if: matrix.python-version == '3.11'
        shell: bash
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Validate workflow
        if: matrix.python-version == '3.11'
        shell: bash
        run: actionlint .github/workflows/ci.yml

      - name: Write CI summary
        if: matrix.python-version == '3.11'
        shell: bash
        run: |
          {
            echo "## CI quality gates"
            echo
            echo "- Python versions: 3.11, 3.12, 3.13"
            echo "- Ruff lint: passed"
            echo "- Pytest coverage threshold: 65%"
            echo "- Dependency audit: passed"
            echo "- Workflow validation: passed"
          } >> "$GITHUB_STEP_SUMMARY"
